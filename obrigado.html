<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem Enviada — Filipe Santos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .thanks-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .thanks-icon {
      font-size: 3rem;
      color: #ccf381;
      margin-bottom: 1rem;
    }
    .thanks-card h1 {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: #e8e8e8;
    }
    .thanks-card p {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card">
      <div class="thanks-icon">✓</div>
      <h1>Obrigado!</h1>
      <p>Sua mensagem foi enviada com sucesso. Entrarei em contato o mais breve possível.</p>
      <a href="index.html" class="btn btn-primary">Voltar ao início</a>
    </div>
  </div>
</body>
</html>
